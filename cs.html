<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INU Starter — CS</title>
    <meta name="description" content="학부 재학 중 수강한 주요 과목 정리" />

    <!-- FOUC 가드 : paint 전에 테마 확정 (다크 기본, localStorage/시스템 반영) -->
    <script>
      (function () {
        try {
          var t =
            localStorage.getItem("theme") ||
            (matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark");
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>

    <!-- 라틴 디스플레이/모노 : Space Grotesk + JetBrains Mono (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- 한글 : Pretendard 통일 폰트 (dynamic subset) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />

    <script defer src="js/main.js"></script>
    <script defer src="js/layout.js"></script>
  </head>
  <body>
    <header id="site-nav"></header>

    <main class="container-grid" style="padding-block: var(--space-12)">
      <p class="t-eyebrow" style="margin-bottom: var(--space-3)">CS</p>
      <h1 class="t-display-md">전공 과목</h1>
      <p class="t-body" style="margin-top: var(--space-4); margin-bottom: var(--space-8)">
        학부 재학 중 수강한 주요 전공 과목을 정리했습니다.
      </p>

      <div class="card-grid">
        <article class="card">
          <p class="card__tag">Course</p>
          <h2 class="card__title">운영체제</h2>
          <p class="card__desc">임시 텍스트</p>
        </article>

        <article class="card">
          <p class="card__tag">Course</p>
          <h2 class="card__title">데이터베이스</h2>
          <p class="card__desc">임시 텍스트</p>
        </article>

        <article class="card">
          <p class="card__tag">Course</p>
          <h2 class="card__title">디지털공학</h2>
          <p class="card__desc">임시 텍스트</p>
        </article>

        <article class="card">
          <p class="card__tag">Course</p>
          <h2 class="card__title">자료구조</h2>
          <p class="card__desc">임시 텍스트</p>
        </article>

        <article class="card">
          <p class="card__tag">Course</p>
          <h2 class="card__title">알고리즘</h2>
          <p class="card__desc">임시 텍스트</p>
        </article>
      </div>
    </main>

    <footer id="site-footer"></footer>
  </body>
</html>
