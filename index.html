<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INU Starter — Project</title>
    <meta
      name="description"
      content="이용진의 학기 중 프로젝트 및 활동 소개"
    />

    <!-- FOUC 가드 : paint 전에 테마 확정 (다크 기본, localStorage/시스템 반영) -->
    <script>
      (function () {
        try {
          var t =
            localStorage.getItem("theme") ||
            (matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark");
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>

    <!-- 라틴 디스플레이/모노 : Space Grotesk + JetBrains Mono (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- 한글 : Pretendard 통일 폰트 (dynamic subset) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />

    <!-- 스타일 : tokens → base → components 순서 (FOUC 방지용 정적 link) -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />

    <!-- main.js 먼저(INU.bindNav/bindTheme 정의) → layout.js (nav/footer 주입) -->
    <script defer src="js/main.js"></script>
    <script defer src="js/layout.js"></script>
  </head>
  <body>
    <!-- 공통 nav 주입 위치 (layout.js) -->
    <header id="site-nav"></header>

    <main>
      <!-- 히어로 : 딥스페이스 정적 히어로 (별자리 캔버스 없음) -->
      <section class="hero">
        <div class="hero__inner">
          <p class="t-eyebrow">Projects</p>
          <h1 class="t-hero-display">
            학기 중 진행한 <span class="hero-accent">프로젝트</span>를 소개합니다
          </h1>
          <p class="t-lead">
            개발과 연구, 두 방향으로 진행한 활동들을 정리했습니다.
          </p>
          <div class="hero__cta">
            <a class="btn btn--primary btn--lg" href="components.html"
              >컴포넌트 보기</a
            >
            <a class="btn btn--lg" href="about.html">소개</a>
          </div>
        </div>
      </section>

      <!-- 카드 피드 : 필터 칩 + 카드 그리드 데모 -->
      <section class="container-grid" style="padding-block: var(--space-12)">
        <p class="t-eyebrow" style="margin-bottom: var(--space-3)">Filter</p>
        <div class="chip-row" style="margin-bottom: var(--space-8)">
          <button class="chip is-active" type="button">전체</button>
          <button class="chip" type="button">개발</button>
          <button class="chip" type="button">연구</button>
        </div>

        <div class="card-grid">
          <article class="card">
            <p class="card__tag">Dev</p>
            <h2 class="card__title">Game Development</h2>
            <p class="card__desc">
              Unity 게임 엔진을 이용해 메트로베니아 장르 게임 제작.
            </p>
          </article>

          <article class="card">
            <p class="card__tag">Research</p>
            <h2 class="card__title">ML paper</h2>
            <p class="card__desc">
              classical ML 방법론에 대한 논문 제1저자 등재.
            </p>
          </article>
        </div>
      </section>
    </main>

    <!-- 공통 footer 주입 위치 (layout.js) -->
    <footer id="site-footer"></footer>
  </body>
</html>
